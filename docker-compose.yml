# ==========================================
# DeepResearch Platform - Docker Compose
# ==========================================
version: '3.8'

services:
  # ----------------------------------------
  # 后端服务 (FastAPI)
  # ----------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deepresearch-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-deepseek-ai/DeepSeek-V2.5}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - JINA_API_KEY=${JINA_API_KEY:-}
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://frontend:5173
      - CACHE_TYPE=${CACHE_TYPE:-memory}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TOOL_TIMEOUT=${TOOL_TIMEOUT:-15}
      - TOTAL_TIMEOUT=${TOTAL_TIMEOUT:-120}
    volumes:
      - ./backend:/app
      - /app/__pycache__
    networks:
      - deepresearch-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ----------------------------------------
  # 前端服务 (React + Vite)
  # ----------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deepresearch-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - VITE_WS_BASE_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - deepresearch-network
    depends_on:
      - backend

  # ----------------------------------------
  # Redis 缓存服务 (可选)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    container_name: deepresearch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - deepresearch-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

# ----------------------------------------
# 网络配置
# ----------------------------------------
networks:
  deepresearch-network:
    driver: bridge

# ----------------------------------------
# 数据卷
# ----------------------------------------
volumes:
  redis-data:
    driver: local
